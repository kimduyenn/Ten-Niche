<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE+ Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">VIBE+</div>

<ul>
<li onclick="openCart()">🛒 <span id="cart-count">0</span></li>
<li><a href="https://www.facebook.com/profile.php?id=61578541236556Ten-Niche" target="_blank">FB</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">
<h1>ENERGY PATCH</h1>
<p>Boost Focus - No Crash</p>
</section>

<!-- SWIPE PRODUCTS -->
<section class="products">
<h2>SẢN PHẨM</h2>

<div class="scroll">

<div class="card" onclick="openDetail('BASIC',119)">
<img src="Basic.jpg">
<h3>BASIC</h3>
<p class="price">119k</p>
</div>

<div class="card" onclick="openDetail('BLACK',119)">
<img src="Black_White.jpg">
<h3>BLACK</h3>
<p class="price">119k</p>
</div>

<div class="card" onclick="openDetail('PASTEL',119)">
<img src="Pastel.jpg">
<h3>PASTEL</h3>
<p class="price">119k</p>
</div>

</div>
</section>

<!-- COMBO -->
<section class="products">
<h2>COMBO</h2>

<div class="card" onclick="addToCart('Full Set',499)">
<h3>FULL SET</h3>
<p class="price">499k</p>
</div>

</section>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="modal-content">

<h2>Giỏ hàng</h2>
<div id="cart-items"></div>

<p>Tổng: <span id="total">0</span>k</p>
<p>🚚 Free ship</p>

<button onclick="checkout()">Mua ngay</button>
<button onclick="closeCart()">Đóng</button>

</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
<div class="modal-content">

<h2>Thanh toán</h2>

<input placeholder="Họ tên" id="name">
<input placeholder="SĐT" id="phone">
<input placeholder="Địa chỉ" id="address">

<p>Tổng tiền: <span id="final"></span>k</p>

<button onclick="confirmOrder()">Xác nhận</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
